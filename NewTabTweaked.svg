<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    /* Single color that follows the OS light/dark theme */
    :root { --c: #1f1f1f; }
    @media (prefers-color-scheme: dark) { :root { --c: #e8eaed; } }
  </style>
  <mask id="chrome">
    <image width="100" height="100" href="data:image/png;base64,"/>
  </mask>
  <rect width="100" height="100" fill="var(--c)" mask="url(#chrome)"/>
</svg>
