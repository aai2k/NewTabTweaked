<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="icon" type="image/svg+xml" href="NewTabTweaked.svg">
  <script src="preload.js"></script>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>

  <!-- Weather widget (top-left) -->
  <div id="weather" style="display:none">
    <span id="weather-icon"></span>
    <div id="weather-text">
      <span id="weather-temp"></span>
      <span id="weather-desc"></span>
      <span id="weather-city"></span>
    </div>
  </div>

  <!-- Settings button (bottom-right, like Chrome's pencil icon) -->
  <button id="settings-btn" title="Customize">
    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
      <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
    </svg>
  </button>

  <!-- Settings panel -->
  <div id="settings-panel" class="hidden">
    <div class="settings-title">Background</div>

    <label class="settings-label">Image URL</label>
    <input type="text" id="bg-url" placeholder="https://...">

    <label class="settings-label">Or upload a file</label>
    <label class="file-btn">
      Choose image
      <input type="file" id="bg-file-input" accept="image/*" style="display:none">
    </label>

    <div class="settings-row">
      <button class="btn btn-primary" id="bg-apply-url">Apply URL</button>
      <button class="btn" id="bg-clear">Clear</button>
    </div>
    <div id="settings-msg"></div>

    <div class="settings-sep"></div>

    <div class="settings-title">Weather location</div>
    <label class="settings-label">City (leave blank for automatic)</label>
    <input type="text" id="weather-city-input" placeholder="e.g. Berlin">
    <div class="settings-row">
      <button class="btn btn-primary" id="weather-apply">Set city</button>
      <button class="btn" id="weather-auto">Use my location</button>
    </div>
    <div id="weather-msg"></div>

    <div class="settings-sep"></div>

    <div class="settings-title">Shortcuts</div>
    <p class="settings-hint">Drag any tile to reorder it. Hover a tile and click × to remove or hide it.</p>
    <button class="btn" id="restore-hidden">Restore hidden top sites</button>
    <div id="shortcuts-msg"></div>
  </div>

  <!-- Main content -->
  <main>
    <div id="logo">
      <span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue">g</span><span class="g-green">l</span><span class="g-red">e</span>
    </div>

    <form id="search-form" autocomplete="off">
      <div id="search-wrap">
        <div id="search-box">
          <button type="button" id="plus-btn" title="Search" tabindex="-1">
            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="#5f6368" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          </button>
          <input
            type="text"
            id="search-input"
            placeholder="Search Google or type a URL"
            spellcheck="false"
          >
          <button type="button" id="mic-btn" title="Search by voice">
            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="#4285F4" d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/><path fill="#34A853" d="M11 18.92V22h2v-3.08A7 7 0 0 0 19 12h-2a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92z"/></svg>
          </button>
          <button type="button" id="lens-btn" title="Search by image (Google Lens)">
            <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="12" r="3" fill="#4285F4"/><path fill="#5f6368" d="M9 2 7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9zm3 15a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
          </button>
          <button type="button" id="ai-btn" title="AI Mode" class="ai-pill">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="m12 2 2.4 6.6L21 11l-6.6 2.4L12 20l-2.4-6.6L3 11l6.6-2.4L12 2z"/></svg>
            <span>AI Mode</span>
          </button>
          <button type="button" id="ai-close" title="Close" tabindex="-1">
            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="#5f6368" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
        <ul id="suggestions" class="hidden"></ul>

        <!-- Plus menu -->
        <div id="plus-menu" class="menu hidden">
          <div class="menu-header">Add to shortcuts</div>
          <ul id="recent-tabs"></ul>
          <div class="menu-sep"></div>
          <button type="button" class="menu-item" id="menu-upload-image">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#5f6368" d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
            <span>Search by image</span>
          </button>
        </div>
      </div>
    </form>

    <div id="shortcuts"></div>
  </main>

  <!-- Lens (search by image) dialog -->
  <div id="lens-modal" class="modal hidden">
    <div class="lens-box">
      <div class="lens-header">
        <span>Search any image with Google Lens</span>
        <button type="button" id="lens-close" class="lens-x" title="Close">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div id="lens-drop" class="lens-drop">
        <svg viewBox="0 0 24 24" width="42" height="42"><path fill="#5f6368" d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
        <div class="lens-drop-text">
          Drag an image here or
          <label class="lens-file-label">upload a file
            <input type="file" id="lens-file" accept="image/*" hidden>
          </label>
        </div>
      </div>
      <div class="lens-or"><span>OR</span></div>
      <div class="lens-url-row">
        <input type="text" id="lens-url" placeholder="Paste an image link">
        <button type="button" class="btn btn-primary" id="lens-search">Search</button>
      </div>
      <div id="lens-msg"></div>
    </div>
  </div>

  <!-- Add-shortcut modal -->
  <div id="shortcut-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-title">Add shortcut</div>

      <div class="field">
        <input type="text" id="sc-name" class="field-input" placeholder=" ">
        <label for="sc-name" class="field-label">Name</label>
        <ul id="sc-suggestions" class="hidden"></ul>
      </div>

      <div class="field">
        <input type="text" id="sc-url" class="field-input" placeholder=" ">
        <label for="sc-url" class="field-label">URL</label>
      </div>

      <div id="sc-msg"></div>

      <div class="modal-actions">
        <button class="btn btn-text" id="sc-cancel">Cancel</button>
        <button class="btn btn-primary" id="sc-save">Done</button>
      </div>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
